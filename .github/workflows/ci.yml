name: Python CI

on:
  push:
    branches: [main, portfolio-polish]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
      - run: python -m pip install -e .
      - run: python -m pytest -q

